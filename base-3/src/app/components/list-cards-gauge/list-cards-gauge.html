<div class="grid grid-cols-1 gap-4 p-4 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 sm:p-6 lg:p-8">
  @for (dev of dataManometros(); track dev.id_manometro) {
    <app-card-gauge
      [routerLink]="['/dashboard', dev.id_manometro]"
      routerLinkActive="is-active-card"
      [routerLinkActiveOptions]="{ exact: true }"
      [siganlID]="dev.id_manometro"
      [signalFecha]="dev.fecha_ultima_lectura"
      [signalUltimaLectura]="dev.ultima_lectura"
      [signalValue]="getSignal(dev.id_manometro)()"
    >
    </app-card-gauge>
  }
</div>
