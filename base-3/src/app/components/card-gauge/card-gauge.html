<article class="card-shell" tabindex="0" role="button" aria-label="Ver detalle del manometro {{ siganlID() }}">
  <header class="card-head">
    <div>
      <p class="card-label">Presion</p>
      <h3 class="card-title">Manometro {{ siganlID() }}</h3>
    </div>
    <span class="card-badge" [class]="'card-badge ' + statusClass()">
      <span class="card-badge-dot" aria-hidden="true"></span>
      {{ statusText() }}
    </span>
  </header>

  <section class="card-main">
    <div class="card-gauge-wrap">
      <app-analog-gauge [value]="signalValue()" [size]="180"></app-analog-gauge>
    </div>

    <div class="card-kpi">
      <p class="kpi-label">Valor actual</p>
      <p class="kpi-value">{{ signalValue() | number: '1.0-1' }} <span>PSI</span></p>
      <p class="kpi-subtext">Ultimo guardado: {{ signalUltimaLectura() | number: '1.0-1' }} PSI</p>
    </div>
  </section>

  <footer class="card-foot">
    <div>
      <p class="foot-label">Ultima actualizacion</p>
      <p class="foot-time">{{ relativeTime() }}</p>
    </div>
    <p class="foot-date">{{ signalFecha() | date: 'dd/MM/yyyy HH:mm' }}</p>
  </footer>
</article>
